services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nyx
      POSTGRES_USER: nyx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nyx_password}
    volumes:
      - nyx_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyx -d nyx"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - nyx_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nyx_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nyx_minio_password}
    volumes:
      - nyx_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9000:9000"
      - "9001:9001"

  create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-nyx_minio} ${MINIO_ROOT_PASSWORD:-nyx_minio_password};
      mc mb -p local/${S3_BUCKET:-nyx-media} || true;
      mc anonymous set download local/${S3_BUCKET:-nyx-media} || true;
      "

  coturn:
    image: coturn/coturn:latest
    command: >
      -n --log-file=stdout --min-port=49160 --max-port=49200
      --lt-cred-mech --realm=${TURN_REALM:-nyx.local}
      --user=${TURN_USERNAME:-nyx}:${TURN_CREDENTIAL:-change_me}
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"

  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - nyx_api_data:/app/data
      - nyx_backups:/app/backups
    command: sh -c "npm run migrate:pg && npm start"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nyx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  push-worker:
    build: .
    env_file: .env
    depends_on:
      - api
      - redis
    command: npm run worker:push
    restart: unless-stopped

  media-worker:
    build: .
    env_file: .env
    depends_on:
      - api
      - redis
    command: npm run worker:media
    restart: unless-stopped

  bot-worker:
    build: .
    env_file: .env
    depends_on:
      - api
      - redis
    command: npm run worker:bot-updates
    restart: unless-stopped

  backup-worker:
    build: .
    env_file: .env
    depends_on:
      - api
      - redis
    command: npm run worker:backups
    restart: unless-stopped

volumes:
  nyx_postgres:
  nyx_redis:
  nyx_minio:
  nyx_api_data:
  nyx_backups:
